---
name: Add issues to project board

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

jobs:
  add-issue-to-project:
    permissions: {}
    runs-on: ubuntu-slim
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/add-to-project@a6fcadb1b99b38060e784a2b628bff0acb3fc0fe # v0
        with:
          # yamllint disable-line rule:line-length
          project-token: ${{ secrets.PROJECT_PAT }} # zizmor: ignore[secrets-outside-env]

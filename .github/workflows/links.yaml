---
name: Links

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  links:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/links@0a54f965cd2ff530f3313bbbaf384cf54bbb7374 # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

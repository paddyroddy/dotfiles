---
name: Links

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  links:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/links@a6fcadb1b99b38060e784a2b628bff0acb3fc0fe # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
